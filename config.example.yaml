# Tarha Coding Agent Configuration
# Copy to config.yaml and customize.
# Priority: env vars > sys.config > config.yaml > defaults

ollama:
  model: glm-5:cloud
  host: http://localhost:11434
  timeout: 30000

agent:
  max_iterations: 100
  workspace: .

memory:
  max_size: 10000
  consolidate_threshold: 20

session:
  max_messages: 100
  max_context_ratio: 0.85

repl:
  no_color: false
